<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MangaTrace Viewer</title>
  <style>
    body { margin:0; font-family: system-ui, sans-serif; background:#202020; color:white; }
    header { position:sticky; top:0; background:#111; padding:12px; display:flex; gap:12px; align-items:center; z-index:2; }
    button { padding:10px 14px; border:0; border-radius:10px; cursor:pointer; }
    main { display:flex; justify-content:center; padding:20px; }
    img { max-width: min(100%, 900px); height:auto; background:#fff; box-shadow:0 8px 30px #0008; }
    .small { opacity:.8; font-size:12px; }
    #debug { white-space:pre-wrap; background:#111; padding:10px; border-radius:8px; max-width:520px; overflow:auto; }
  </style>
</head>
<body>
  <header>
    <button onclick="prevPage()">前へ</button>
    <button onclick="nextPage()">次へ</button>
    <button onclick="loadPage()">再生成</button>
    <button onclick="logout()">ログアウト</button>
    <span id="pageLabel"></span>
    <span class="small">表示画像は /api/views/{view_id}/image から生成されたユーザー別透かし入り画像</span>
  </header>
  <main>
    <div>
      <img id="pageImage" alt="manga page" />
      <pre id="debug"></pre>
    </div>
  </main>
  <script>
    let pages = [];
    let idx = 0;

    async function api(url, options={}) {
      const res = await fetch(url, {credentials:'include', ...options});
      if (res.status === 401) location.href = '/';
      if (!res.ok) throw new Error(await res.text());
      return res;
    }

    async function init() {
      const res = await api('/api/pages');
      pages = (await res.json()).pages;
      if (!pages.length) throw new Error('ページがありません。scripts/init_demo.py を実行してください。');
      await loadPage();
    }

    async function loadPage() {
      const page = pages[idx];
      pageLabel.textContent = `${page.title} (${idx + 1}/${pages.length})`;
      const res = await api('/api/views', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({page_id: page.id})
      });
      const view = await res.json();
      pageImage.src = `/api/views/${view.view_id}/image?ts=${Date.now()}`;
      debug.textContent = JSON.stringify(view, null, 2) + '\n\n※ debug_payload_id/debug_auth_tag はMVP確認用。本番では返さない。';
    }

    function prevPage() { if (idx > 0) { idx--; loadPage(); } }
    function nextPage() { if (idx < pages.length - 1) { idx++; loadPage(); } }
    async function logout() { await api('/api/auth/logout', {method:'POST'}); location.href='/'; }
    init().catch(e => alert(e.message));
  </script>
</body>
</html>
