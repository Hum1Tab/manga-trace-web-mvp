<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MangaTrace Login</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 80px auto; padding: 24px; background:#f7f7f7; }
    .card { background:white; padding:24px; border-radius:16px; box-shadow:0 8px 24px #0001; }
    input, button { width:100%; padding:12px; margin:8px 0; box-sizing:border-box; font-size:16px; }
    button { cursor:pointer; border:0; border-radius:10px; background:#111; color:white; }
    code { background:#eee; padding:2px 6px; border-radius:6px; }
    .error { color:#b00020; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MangaTrace MVP</h1>
    <p>デモユーザー: <code>demo@example.com</code> / パスワード: <code>password</code></p>
    <input id="email" value="demo@example.com" autocomplete="username" />
    <input id="password" value="password" type="password" autocomplete="current-password" />
    <button onclick="login()">ログイン</button>
    <p id="msg" class="error"></p>
  </div>
  <script>
    async function login() {
      const msg = document.getElementById('msg');
      msg.textContent = '';
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'include',
        body: JSON.stringify({email: email.value, password: password.value})
      });
      if (!res.ok) {
        msg.textContent = 'ログイン失敗: ' + await res.text();
        return;
      }
      location.href = '/viewer';
    }
  </script>
</body>
</html>
